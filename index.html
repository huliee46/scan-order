<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>扫码点餐 - 智慧餐厅</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ff6b35, #ff8f65);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 10px; }
    .subtitle { font-size: 14px; color: #999; margin-bottom: 30px; }
    .table-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }
    .table-btn {
      background: #f5f5f5;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 20px 10px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      transition: all 0.3s;
    }
    .table-btn:hover, .table-btn:active {
      background: #fff0eb;
      border-color: #ff6b35;
      color: #ff6b35;
    }
    .tips {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .open-btn {
      background: linear-gradient(135deg, #ff6b35, #ff8f65);
      color: #fff;
      border: none;
      border-radius: 50rpx;
      padding: 24rpx 60rpx;
      font-size: 32rpx;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
      box-shadow: 0 4rpx 16rpx rgba(255, 107, 53, 0.3);
    }
    .open-btn:active {
      transform: scale(0.98);
    }
    .loading {
      display: none;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🍜</div>
    <div class="title">智慧点餐</div>
    <div class="subtitle">请选择您的桌号开始点餐</div>
    
    <div class="table-grid">
      <button class="table-btn" onclick="selectTable(1)">01</button>
      <button class="table-btn" onclick="selectTable(2)">02</button>
      <button class="table-btn" onclick="selectTable(3)">03</button>
      <button class="table-btn" onclick="selectTable(4)">04</button>
      <button class="table-btn" onclick="selectTable(5)">05</button>
      <button class="table-btn" onclick="selectTable(6)">06</button>
      <button class="table-btn" onclick="selectTable(7)">07</button>
      <button class="table-btn" onclick="selectTable(8)">08</button>
      <button class="table-btn" onclick="selectTable(9)">09</button>
      <button class="table-btn" onclick="selectTable(10)">10</button>
      <button class="table-btn" onclick="selectTable(11)">11</button>
      <button class="table-btn" onclick="selectTable(12)">12</button>
    </div>
    
    <div class="tips" id="tips">
      👆 点击您的桌号，然后点击下方按钮打开小程序
    </div>
    
    <a class="open-btn" id="openBtn" href="javascript:void(0);">打开小程序</a>
    
    <div class="loading" id="loading"></div>
  </div>

  <script>
    // ==================== 配置区 ====================
    // 替换为你小程序的原始ID
    const MINI_APP_ID = 'gh_xxxxxxxx';  // 例如：gh_abc123def456
    // ================================================

    let selectedTable = '';

    function selectTable(tableNo) {
      selectedTable = String(tableNo).padStart(2, '0');
      document.getElementById('tips').innerHTML = `✅ 已选择：<strong>${selectedTable} 号桌</strong><br>点击下方按钮打开小程序`;
      
      // 高亮选中按钮
      document.querySelectorAll('.table-btn').forEach(btn => btn.style.borderColor = 'transparent');
      event.target.style.borderColor = '#ff6b35';
      event.target.style.background = '#fff0eb';
      event.target.style.color = '#ff6b35';
    }

    document.getElementById('openBtn').addEventListener('click', function() {
      if (!selectedTable) {
        alert('请先选择您的桌号！');
        return;
      }
      
      // 尝试多种方式打开小程序
      const isWeixin = navigator.userAgent.toLowerCase().includes('micromessenger');
      
      if (isWeixin) {
        // 微信内置浏览器
        // 尝试复制桌号到剪贴板
        wx.ready && wx.miniProgram.navigateTo({ url: '/pages/index/index?table=' + selectedTable });
      } else {
        // 普通浏览器 - 提示用户
        const confirm = window.confirm('请按以下步骤操作：\n\n1. 打开微信\n2. 搜索小程序「智慧点餐」\n3. 进入后系统会自动识别桌号\n\n（您已选择：' + selectedTable + '号桌）');
        
        if (confirm) {
          // 复制桌号
          const input = document.createElement('input');
          input.value = selectedTable;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
          alert('桌号 ' + selectedTable + ' 已复制到剪贴板！\n打开小程序后系统会自动识别。');
        }
      }
    });

    // 自动检测URL参数中的桌号
    const urlParams = new URLSearchParams(window.location.search);
    const tableFromUrl = urlParams.get('table');
    if (tableFromUrl) {
      selectTable(tableFromUrl);
    }
  </script>
</body>
</html>
